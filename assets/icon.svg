<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16233c"/>
      <stop offset="1" stop-color="#0b101c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7db4fd"/>
      <stop offset="0.5" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.32" r="0.75">
      <stop offset="0" stop-color="#3b82f6" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Rounded-square tile with a subtle inner border -->
  <rect x="14" y="14" width="484" height="484" rx="112" fill="url(#bg)"/>
  <rect x="19" y="19" width="474" height="474" rx="107" fill="none" stroke="#33456b" stroke-width="3" opacity="0.8"/>

  <!-- Soft glow behind the bridge -->
  <rect x="14" y="14" width="484" height="484" rx="112" fill="url(#glow)"/>

  <g transform="translate(0,-34)">
    <!-- Bridge deck (solid color: gradients degenerate on zero-height paths) -->
    <path d="M 100 356 H 412" stroke="#3d5a8f" stroke-width="24" stroke-linecap="round"/>

    <!-- Suspension cables -->
    <path d="M 196 268 V 356" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
    <path d="M 256 246 V 356" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" opacity="0.55"/>
    <path d="M 316 268 V 356" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" opacity="0.55"/>

    <!-- Main arc -->
    <path d="M 116 356 Q 256 132 396 356" stroke="url(#accent)" stroke-width="34" stroke-linecap="round" fill="none"/>

    <!-- Endpoint nodes: local machine and dev server -->
    <circle cx="116" cy="356" r="34" fill="#0b101c" stroke="url(#accent)" stroke-width="16"/>
    <circle cx="396" cy="356" r="34" fill="#0b101c" stroke="url(#accent)" stroke-width="16"/>
  </g>
</svg>
